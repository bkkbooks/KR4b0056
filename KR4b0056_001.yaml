body:
  text: 卷一朱鷺因風弄玉水映日上金堤猶持畏羅繳未得異鳧鷖聞君愛白雉兼因重碧雞未能聲似鳳聊變色如圭願識昆明路乘流飲復棲文苑英華二百六樂府詩集十六詩紀七十八鼓瑟曲有所思鼓瑟曲有所思夜風吹熠耀朝光照昔邪幾銷蘼蕪葉空落蒲桃花不堪長織素誰能獨浣紗光陰復何極望促反成賒知君自蕩子奈妾亦倡家玉臺新詠六類聚四十一作有所思行文苑英華二百二樂府詩集十七詩紀七十八白馬篇千里生冀北玉鞘黃金勒散蹄去無已搖頭意相得豪氣發西山雄風擅東國飛鞚出秦隴長驅繞岷僰承謨若有神稟算良不惑瀄汨河水黃參差嶂雲黑安能對兒女垂帷弄毫墨兼弱不稱雄後得方為特此心亦何已君恩良未塞不許跨天山何由報皇德文苑英華二百九樂府詩集六十三詩紀七十八古意青絲控燕馬紫艾飾吳刀朝風吹錦帶落日映珠袍陸離關右客照耀山西豪雖非學詭遇終是任逢遭人生會有死得處如鴻毛寧能偶雞鶩寂寞隱蓬蒿類聚三十三文苑英華二百五詩紀七十八登高臺試出金華殿聊登銅雀臺九路平如掌千門洞已開軒車映日過簫管逐風來若非邯鄲美便是洛陽才類聚四十二文苑英華二百十詩紀七十八湘夫人桂棟承薜帷眇眇川之湄白蘋徒可望緑芷竟空滋日暮思公子銜意默無辭類聚七十九樂府詩集五十七詩紀七十八侍宴麗景屬春餘清陰澄夏首交枝隱修徑回流影遙阜徙帷轢輕筠移鑾拂高柳去矣勞茂績勉哉報嘉誘小臣良不才涓塵愧所守何用勝雕斫譬木良如朽類聚三十九文苑英華百六十九詩紀七十八又回輿避暑宮下輦迎風館散漫輕煙轉霏微商雲散蔓草亘巖垂高枝起天半回風稍驚水落光漸斜岸妙儛駐行雲清歌入層漢晬顏暢有懌德音良已粲同上落日登高憑高且一望目極不能捨東北指青門西南見白社軫軫河梁上紛紛渭橋下爭利亦爭名驅車復驅馬寧訪蓬蒿人誰憐寂寞者類聚二十八詩紀七十八中川長望長川杳難即四望四無極安流寧可值憤風方未息危帆渡中懸孤光巖下昃岸際樹難辨雲中鳥易識莫恨東復西誰知迂且直故鄉相思者當春愛顏色獨寫千行淚誰同萬里憶類聚二十七詩紀七十八贈顧倉曹洛陽十二門樓闕似西崑曖曖罘罳下相望隔畫垣畫垣向阿閣棲鳳復棲鴛五曹均趨奏六尚等便煩朝爐何馥馥夜錦有餘溫日中驅上駟驤首遍京宛晨趨魏公子夕宿韓王孫夙昔今何在生平棄不論譬如菤葹草心謝葉空存誰復三承睫獨念九飛魂類聚三十一文苑英華二百四十七詩紀七十八又廣文選八引崑垣鴛煩溫宛論存魂九韻秋日愁居答孔主簿首秋雲物善晝暑旦猶清日華隨水泛樹影逐風輕依簾野馬合當戶昔耶生物我一無際人鳥不相驚儻過北山北聊訪法高卿類聚三十一文苑英華二百四十詩紀七十八至牛渚憶魏少英楓林曖似畫沙岸淨如掃空籠望懸石回斜見危島緑草間遊蜂青葭集輕鴇徘徊洞初月浸淫潰春潦非願歲物華徒用風光好類聚二十八文苑英華二百八十九詩紀七十八寄何記室思君不得見望望獨長嗟夜風入寒水晚露拂秋花何由假日御暫得寄風車類聚三十一詩紀七十八忽不任愁聊示固遠去秋客舊吳今春投故越淚逐東歸水心挂西斜月未應歲貶顏直以憂殘髮類聚三十五詩紀七十八為何庫部舊姬擬蘼蕪之句出戶望蘭薰褰簾正逢君斂容才一訪新知詎可聞新人含笑近故人含淚隱妾意在寒松君心逐朝槿玉臺新詠六類聚三十二作為何遜舊姬擬上山采蘼蕪詩紀七十八何生姬人有怨寒樹棲羇雌月映風復吹逐臣與棄妾零落心可知寶琴徒七弦蘭燈空百枝顰容不足效啼粧拭復垂同衾成楚越異國非仳離玉臺新詠六詩紀七十八為人傷近而不見嬴女鳳皇樓漢姬柏梁殿詎勝仙將死音容猶可見我有一心人同鄉不異縣異縣不成隔同鄉更脈脈脈脈如牛女無妨年一語玉臺新詠六作為人傷近不見類聚三十二詩紀七十八月夜詠陳南康新有所納月夜詠陳南康新有所納二八人如花三五月如鏡開簾一種色當戶兩相映重價出秦韓高名入燕鄭十城屢請易千金幾爭聘君意自能專妾心本無競玉臺新詠六類聚十八詩紀七十八詠搗衣足傷金管遽多愴緹光促露團池上紫風飄庭裏緑下機騖西眺鳴砧遽東旭芳汗似蘭湯雕金辟龍燭散度廣陵音摻寫漁陽曲別鶴悲不已離鸞斷更續尺素在魚腸寸心憑雁足玉臺新詠六引促旭燭曲續足六韻類聚六十七引促緑曲續足五韻詩紀七十八與司馬治書同聞鄰婦夜織洞房風已激長廊月復清藹藹夜庭廣飄飄曉帳輕雜聞百蟲思偏傷一鳥聲鳥聲長不息妾心復何極猶恐君無衣夜夜當窗織玉臺新詠六詩紀七十八為人述夢已知想成夢未信夢如此皎皎無片非的的一皆是已親芙蓉褥方開合歡被雅步極嫣妍含辭姿委靡如言非倏忽不意成俄爾及寤盡空無方知悉虛詭玉臺新詠六詩紀七十八侍宴景陽樓金鋪爍可鏡桂棟儼臨雲沾觴均飲德服道驗朝聞詎論禹無間非恥堯為君小臣亦何者短翮屢追群類聚三十九文苑英華百六十九詩紀七十八春日寄鄉友春日寄鄉友旅心已多恨春至尚離群翠枝結斜影緑水散圓文戲魚兩相顧遊鳥半藏雲何時不憫默是日最思君類聚三文苑英華百五十七詩紀七十八夜愁示諸賓簷露滴為珠池水合成璧萬行朝淚瀉千里夜愁積孤帳閉不開寒膏盡復益誰知心眼亂看朱忽成碧玉臺新詠六作夜愁類聚三十五詩紀七十八送殷何兩記室掩袖出南浦驅車送上征飄飄曉雲駛漾漾旦潮平不肖余何惜無資爾勿輕倘有還書便一言訪死生何水部集二作贈何殷記室類聚二十九文苑英華二百六十六詩紀七十八春閨怨春閨怨愁來不理鬢春至更攢眉悲看蛺蝶粉泣望蜘蛛絲月映寒蛩褥風吹翡翠帷飛鱗難託意駛翼不銜辭玉臺新詠六詩紀七十八秋閨怨斜光隱西壁暮雀上南枝風來秋扇屏月出夜燈吹深心起百際遙淚非一垂徒勞妾辛苦終言君不知玉臺新詠六詩紀七十八詠寵姬及君高堂還值妾妍粧罷曲房褰錦帳回廊步珠屣玉叉時可挂羅襦詎難解再顧連城易一笑千金買類聚三十二又作寵姬詩詩紀七十八在王晉安酒席數韻窈窕宋容華但歌有清曲轉盻非無以斜扇還相矚詎減許飛瓊多勝劉碧玉何因送款款半飲杯中醁玉臺新詠六類聚三十二作詠姬人詩詩紀七十八為人寵姬有怨為人寵姬有怨可憐獨立樹枝輕根易搖已為露所浥復為風所飄錦衾襞不開端坐夜及朝是妾愁成瘦非君重細腰玉臺新詠六詩紀七十八為姬人自傷自知心裏恨還向影中羞回持昔慊慊變作今悠悠還君與妾珥歸妾奉君裘弦斷猶可續心去最難留玉臺新詠六作為人自傷類聚三十二作又為姬人怨詩詩紀七十八為人有贈碧玉與緑珠張盧復雙女曼聲古難匹長袂世無侶似出鳳凰樓言發瀟湘渚幸有褰裳便含情寄一語玉臺新詠六詩紀七十八見貴者初迎盛姬聊為之詠久想專房麗未見傾城者千金訪繁華一朝遇容冶家本薊門外來戲叢臺下長卿幸未匹文君復新寡玉臺新詠六詩紀七十八傷乞人少年空扶轍白首竟填溝葦席何由足菽藿不能周自顧非好乞行且欲包羞勞君款曲問冒此殷勤酬初學記十八詩紀七十八春思春思雪罷枝即青冰開水便緑復聞黃鳥聲全作相思曲玉臺新詠十類聚三文苑英華百五十七為徐僕射妓作日晚應歸去上客強盤桓稍知玉叉重漸見羅襦寒玉臺新詠十詩紀七十八春怨四時如湍水飛奔競回復夜鳥響嚶嚶朝光照煜煜厭見花成子多看筍為竹萬里斷音書十載異棲宿積怨落芳鬢長啼壞美目君去在榆關妾留住函谷惟對昔邪房如見蜘蛛屋獨與響相酬還將影自逐象床易氈簟羅衣變單復幾過度風霜猶能保煢獨玉臺新詠六詩紀八十一
